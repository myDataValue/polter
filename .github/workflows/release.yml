name: Release & Publish to npm

on:
  workflow_dispatch:
    inputs:
      bump:
        description: "Version bump"
        required: true
        default: "patch"
        type: choice
        options:
          - patch
          - minor
          - major

concurrency:
  group: npm-release
  cancel-in-progress: false

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Bump version and sync root lock
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          case "${{ inputs.bump }}" in
            major) MAJOR=$((MAJOR + 1)); MINOR=0; PATCH=0 ;;
            minor) MINOR=$((MINOR + 1)); PATCH=0 ;;
            patch) PATCH=$((PATCH + 1)) ;;
          esac
          NEW_VERSION="$MAJOR.$MINOR.$PATCH"
          echo "VERSION=$NEW_VERSION" >> "$GITHUB_ENV"

          node -e "
            const pkg = require('./package.json');
            pkg.version = '$NEW_VERSION';
            require('fs').writeFileSync('package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          node -e "
            const pkg = require('./examples/basic/package.json');
            pkg.dependencies['@mydatavalue/polter'] = '^$NEW_VERSION';
            require('fs').writeFileSync('./examples/basic/package.json', JSON.stringify(pkg, null, 2) + '\n');
          "

          # Sync root pnpm-lock.yaml so its version field matches the
          # bumped package.json — no registry lookup needed since polter
          # isn't a dependency of itself.
          pnpm install --lockfile-only

          echo "Bumped version to $NEW_VERSION"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add package.json pnpm-lock.yaml examples/basic/package.json
          git commit -m "Release v$VERSION"
          git tag "v$VERSION"
          git push
          git push origin "v$VERSION"

      - run: pnpm run type-check
      - run: pnpm test
      - run: pnpm run build

      - name: Publish to npm
        run: pnpm publish --access public --provenance --no-git-checks

      - name: Regenerate example lock against the published version
        run: |
          # pnpm publish makes the version resolvable immediately, but
          # registry propagation can take a few seconds — retry briefly.
          for attempt in 1 2 3 4 5; do
            if (cd examples/basic && pnpm install --lockfile-only); then
              break
            fi
            echo "Waiting for v$VERSION to propagate (attempt $attempt)..."
            sleep 5
          done
          git add examples/basic/pnpm-lock.yaml
          if ! git diff --cached --quiet; then
            git commit -m "chore(example): regenerate pnpm-lock.yaml for v$VERSION"
            git push
          fi

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v$VERSION" --generate-notes --title "v$VERSION"
