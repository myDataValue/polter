name: GitHub Pages

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      # Build polter (the example imports from it)
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build

      # Build the example against the local build
      - working-directory: examples/basic
        run: pnpm install --frozen-lockfile
      - working-directory: examples/basic
        run: pnpm link ../..
      - working-directory: examples/basic
        run: pnpm exec vite build --base=/polter/demo/

      # Assemble: docs/ as root, example build as /demo/
      - run: |
          mkdir _site
          cp -r docs/* _site/
          cp -r examples/basic/dist _site/demo

      - uses: actions/upload-pages-artifact@v5
        with:
          path: _site

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
